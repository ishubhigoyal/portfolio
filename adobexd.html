<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illustrator work</title>
    <link rel="stylesheet" href="style.css">
    
     
</head>
<body>
    <div class="work-section1">
        <div class="heading"><h1><b>Adobe XD Work</b></h1></div>
    </div>

        <div class="work-section2">

          <div class="slideshow">

         
<!-- section1 -->
  <div class="image-row">
  <div class="image-box">
    <img src="img/xdpage1.png" alt="home page">
    <p class="caption">Home Page</p>
  </div>

  <div class="image-box">
    <img src="img/xdpage2.png" alt="services">
    <p class="caption">Services Page</p>
  </div>

  <div class="image-box">
    <img src="img/xdpage3.png" alt="destination page1">
    <p class="caption">Destination Page 1</p>
  </div>
</div>



<!-- section2 -->
<div class="image-row">
  <div class="image-box">
    <img src="img/xdpage4.png" alt="destination page2">
    <p class="caption">Destination Page 2</p>
  </div>

  <div class="image-box">
    <img src="img/xdpage5.png" alt="touring page">
    <p class="caption">Touring Page</p>
  </div>

  <div class="image-box">
    <img src="img/xdpage6.png" alt="contact">
    <p class="caption">Contact Page</p>
  </div>
</div>



<!-- section3 -->
<div class="image-row">
  <div class="video-box">
    <video autoplay muted loop playsinline>
    <source src="video/Prototype video.mp4" alt="Prototype video">
    <p class="caption">Prototyping</p>
    </video>
  </div>
</div>
  
    
  
          </div>

          </div>

 
</body>
</html>
